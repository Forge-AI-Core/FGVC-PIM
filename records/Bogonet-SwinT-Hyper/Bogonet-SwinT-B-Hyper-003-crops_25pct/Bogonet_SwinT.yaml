project_name: Bogonet-SwinT-Hyper
exp_name: Bogonet-SwinT-B-Hyper-003-crops_25pct
use_wandb: False
wandb_entity: account
train_root: ./classification_split/crops_25pct_split/train
val_root: ./classification_split/crops_25pct_split/test/
data_size: 384
num_workers: 8
batch_size: 16
model_name: swin-t
pretrained: ~
optimizer: AdamW
max_lr: 0.00005    # 기존(0.0001) 대비 속도 절반으로 감소
wdecay: 0.15       # 기존(0.05) 대비 페널티 3배 강화
max_epochs: 30
warmup_batchs: 800
use_amp: True
use_fpn: True
fpn_size: 1024
use_selection: True
num_classes: 3
num_selects: 
  layer1: 2048
  layer2: 512
  layer3: 128
  layer4: 32
use_combiner: True
lambda_b: 0.5
lambda_s: 0.0
lambda_n: 5.0
lambda_c: 1.0
update_freq: 1
log_freq: 100
eval_freq: 5

